services:
  mysql:
    image: mysql:8.4
    container_name: booking-core-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bookingcore
      MYSQL_USER: ${MYSQL_USER?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD?MYSQL_ROOT_PASSWORD is required}
    ports:
      - "23306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: booking-core-redis
    restart: unless-stopped
    ports:
      - "26379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: booking-core-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/bookingcore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET?JWT_SECRET is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BOOTSTRAP_DEFAULT_MERCHANT_ENABLED: ${BOOTSTRAP_DEFAULT_MERCHANT_ENABLED:-false}
      BOOTSTRAP_DEFAULT_MERCHANT_NAME: ${BOOTSTRAP_DEFAULT_MERCHANT_NAME:-Demo Merchant}
      BOOTSTRAP_DEFAULT_MERCHANT_SLUG: ${BOOTSTRAP_DEFAULT_MERCHANT_SLUG:-demo-merchant}
      BOOTSTRAP_DEFAULT_MERCHANT_USER_ENABLED: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_ENABLED:-false}
      BOOTSTRAP_DEFAULT_MERCHANT_USER_USERNAME: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_USERNAME:-merchant}
      BOOTSTRAP_DEFAULT_MERCHANT_USER_PASSWORD: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_PASSWORD:-}
      BOOTSTRAP_DEFAULT_MERCHANT_USER_MERCHANT_SLUG: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_MERCHANT_SLUG:-demo-merchant}
      BOOTSTRAP_SYSTEM_ADMIN_ENABLED: ${BOOTSTRAP_SYSTEM_ADMIN_ENABLED:-false}
      BOOTSTRAP_SYSTEM_ADMIN_USERNAME: ${BOOTSTRAP_SYSTEM_ADMIN_USERNAME:-admin}
      BOOTSTRAP_SYSTEM_ADMIN_PASSWORD: ${BOOTSTRAP_SYSTEM_ADMIN_PASSWORD:-}
      BOOTSTRAP_DEFAULT_CLIENT_ENABLED: ${BOOTSTRAP_DEFAULT_CLIENT_ENABLED:-false}
      BOOTSTRAP_DEFAULT_CLIENT_USERNAME: ${BOOTSTRAP_DEFAULT_CLIENT_USERNAME:-client}
      BOOTSTRAP_DEFAULT_CLIENT_PASSWORD: ${BOOTSTRAP_DEFAULT_CLIENT_PASSWORD:-}
    ports:
      - "28080:8080"
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: booking-core-frontend
    restart: unless-stopped
    ports:
      - "25173:80"
    depends_on:
      - backend

volumes:
  redis-data:
  mysql-data:
