# Deterministic command-center tests; merge with main application.yml
spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:bookingcore-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

booking:
  homepage:
    tracking-test-buffer: true
  platform:
    time-zone: UTC
    system-admin-token: ""
    auth:
      login:
        rate-limit-enabled: false
        lockout-enabled: false
      internal-system-admin:
        auto-provision: true
        username: admin
        password: admin
    jwt:
      secret: "0123456789abcdef0123456789abcdef"
      expiration-seconds: 86400
    dev-users:
      - username: ${DEV_USER_MERCHANT_USERNAME:merchant@example.com}
        password: ${DEV_USER_MERCHANT_PASSWORD:merchant}
        role: MERCHANT
      - username: ${DEV_USER_ADMIN_USERNAME:admin}
        password: ${DEV_USER_ADMIN_PASSWORD:admin}
        role: SYSTEM_ADMIN
      - username: ${DEV_USER_CLIENT_USERNAME:client@example.com}
        password: ${DEV_USER_CLIENT_PASSWORD:client}
        role: CLIENT
