spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:23306}/${DB_NAME:bookingcore}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:bookingcore}
    password: ${DB_PASSWORD:bookingcore}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple

booking:
  platform:
    jwt:
      secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef}
    auth:
      bootstrap-default-merchant:
        enabled: ${BOOTSTRAP_DEFAULT_MERCHANT_ENABLED:true}
        name: ${BOOTSTRAP_DEFAULT_MERCHANT_NAME:Demo Merchant}
        slug: ${BOOTSTRAP_DEFAULT_MERCHANT_SLUG:demo-merchant}
      bootstrap-default-merchant-user:
        enabled: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_ENABLED:true}
        username: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_USERNAME:merchant}
        password: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_PASSWORD:merchant}
        merchant-slug: ${BOOTSTRAP_DEFAULT_MERCHANT_USER_MERCHANT_SLUG:demo-merchant}
      bootstrap-system-admin:
        enabled: ${BOOTSTRAP_SYSTEM_ADMIN_ENABLED:true}
        username: ${BOOTSTRAP_SYSTEM_ADMIN_USERNAME:admin}
        password: ${BOOTSTRAP_SYSTEM_ADMIN_PASSWORD:admin}
      bootstrap-default-client:
        enabled: ${BOOTSTRAP_DEFAULT_CLIENT_ENABLED:true}
        username: ${BOOTSTRAP_DEFAULT_CLIENT_USERNAME:client}
        password: ${BOOTSTRAP_DEFAULT_CLIENT_PASSWORD:client}
    # Fallback logins when a username is not yet in platform_users (optional; bootstrap seeds DB above)
    dev-users:
      - username: ${DEV_USER_MERCHANT_USERNAME:merchant}
        password: ${DEV_USER_MERCHANT_PASSWORD:merchant}
        role: MERCHANT
      - username: ${DEV_USER_ADMIN_USERNAME:admin}
        password: ${DEV_USER_ADMIN_PASSWORD:admin}
        role: SYSTEM_ADMIN
      - username: ${DEV_USER_CLIENT_USERNAME:client}
        password: ${DEV_USER_CLIENT_PASSWORD:client}
        role: CLIENT

