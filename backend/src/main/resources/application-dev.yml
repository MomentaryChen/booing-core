spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:23306}/${DB_NAME:bookingcore}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple

booking:
  platform:
    jwt:
      secret: ${JWT_SECRET}
    auth:
      internal-system-admin:
        auto-provision: ${INTERNAL_SYSTEM_ADMIN_AUTO_PROVISION:true}
        username: ${INTERNAL_SYSTEM_ADMIN_USERNAME:admin}
        password: ${INTERNAL_SYSTEM_ADMIN_PASSWORD:}

