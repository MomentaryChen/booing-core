spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:23306}/${DB_NAME:bookingcore}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:bookingcore}
    password: ${DB_PASSWORD:bookingcore}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple

booking:
  platform:
    jwt:
      secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef}
    # Dev-only logins for POST /api/auth/login (only when jwt.secret is set)
    dev-users:
      - username: merchant
        password: merchant
        role: MERCHANT
      - username: admin
        password: admin
        role: SYSTEM_ADMIN
      - username: client
        password: client
        role: CLIENT

