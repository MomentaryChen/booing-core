<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"

    />

    <title>Booking Core - Admin</title>

  <body>
    <div id="root"></div>
    <script>
      if (window.location.pathname.startsWith('/admin')) {
        const nextPath = window.location.pathname.replace('/admin', '/system')
        window.location.replace(nextPath + window.location.search + window.location.hash)
      }
    </script>
    <script type="module" src="/src/main-admin.tsx"></script>
  </body>
